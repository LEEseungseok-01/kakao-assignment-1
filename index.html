<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="todo-card" aria-labelledby="appTitle">
      <header class="app-header">
        <p class="app-label">Productivity</p>
        <h1 id="appTitle">Todo</h1>
      </header>

      <div class="date-nav" aria-label="주차 이동">
        <button type="button" class="date-button" id="prevWeekButton" aria-label="이전 주차">‹</button>
        <div class="date-info">
          <p class="current-date" id="currentDate"></p>
          <button type="button" class="today-button" id="todayButton">Today</button>
        </div>
        <button type="button" class="date-button" id="nextWeekButton" aria-label="다음 주차">›</button>
      </div>

      <div class="week-days" id="weekDays" aria-label="이번 주 날짜 목록"></div>

      <form class="todo-form" id="todoForm">
        <label class="sr-only" for="todoInput">새 할 일</label>
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="오늘 할 일을 입력하세요"
          autocomplete="off"
        >
        <button type="submit" class="add-button">추가</button>
      </form>

      <p class="message" id="message" role="alert" aria-live="polite"></p>

      <section class="progress-panel" aria-labelledby="progressTitle">
        <div class="progress-header">
          <h2 id="progressTitle">할일을 미루지 말자!</h2>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">선택한 날짜에 할 일이 없습니다.</p>
      </section>

      <div class="filter-tabs" id="filterTabs" aria-label="Todo 상태 필터">
        <button type="button" class="filter-button is-active" data-filter="all">전체</button>
        <button type="button" class="filter-button" data-filter="active">진행 중</button>
        <button type="button" class="filter-button" data-filter="completed">완료</button>
      </div>

      <ul class="todo-list" id="todoList" aria-label="할 일 목록"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
